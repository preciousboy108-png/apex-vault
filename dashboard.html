<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Vault | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="nav">
        <b style="color:#007bff">APEX VAULT</b>
        <i class="fa-solid fa-right-from-bracket" onclick="logout()"></i>
    </div>

    <p id="userEmail" style="font-size:12px; color:#888"></p>

    <div class="card">
        <input type="text" id="docName" placeholder="Document Name">
        <button onclick="save()">Secure Document</button>
    </div>

    <div id="records"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-AsF-EtsHFRWnMjc3LQSD2UqaNxM2vXc",
            authDomain: "apex-vault-3f235.firebaseapp.com",
            databaseURL: "https://apex-vault-3f235-default-rtdb.firebaseio.com",
            projectId: "apex-vault-3f235",
            storageBucket: "apex-vault-3f235.firebasestorage.app",
            messagingSenderId: "526402607684",
            appId: "1:526402607684:web:6b32fea6ee28a7df0d3a11"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                load(user.uid);
            } else {
                window.location.replace("index.html");
            }
        });

        function save() {
            const name = document.getElementById('docName').value;
            const uid = firebase.auth().currentUser.uid;
            if(!name) return;
            db.ref('users/'+uid+'/docs').push({ name: name, date: new Date().toLocaleDateString() });
            document.getElementById('docName').value = "";
        }

        function load(uid) {
            db.ref('users/'+uid+'/docs').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('records');
                list.innerHTML = "";
                for(let id in data) {
                    list.innerHTML += `<div class="item"><span>📄 ${data[id].name}</span><i class="fa-solid fa-trash" onclick="del('${id}')"></i></div>`;
                }
            });
        }

        function del(id) {
            const uid = firebase.auth().currentUser.uid;
            db.ref('users/'+uid+'/docs/'+id).remove();
        }

        function logout() {
            firebase.auth().signOut().then(() => window.location.replace("index.html"));
        }
    </script>
</body>
</html>
