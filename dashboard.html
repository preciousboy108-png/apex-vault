<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Vault | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .nav b { font-size: 20px; color: #007bff; letter-spacing: 1px; }
        #userEmail { font-size: 12px; color: #888; margin-bottom: 20px; display: block; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .item { background: #1a1a1a; padding: 18px; border-radius: 12px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #007bff; animation: fadeIn 0.4s ease-out; }
        .fa-trash { color: #ff4d4d; cursor: pointer; padding: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="nav">
        <b>APEX VAULT</b>
        <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="cursor:pointer"></i>
    </div>

    <span id="userEmail"></span>

    <div class="card">
        <input type="text" id="docName" placeholder="Document Name/Reference">
        <button onclick="save()">Secure to Cloud</button>
    </div>

    <div id="records"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-AsF-EtsHFRWnMjc3LQSD2UqaNxM2vXc",
            authDomain: "apex-vault-3f235.firebaseapp.com",
            databaseURL: "https://apex-vault-3f235-default-rtdb.firebaseio.com",
            projectId: "apex-vault-3f235",
            storageBucket: "apex-vault-3f235.firebasestorage.app",
            messagingSenderId: "526402607684",
            appId: "1:526402607684:web:6b32fea6ee28a7df0d3a11"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userEmail').innerText = "Secured: " + user.email;
                load(user.uid);
            } else {
                window.location.replace("index.html");
            }
        });

        function save() {
            const name = document.getElementById('docName').value;
            const user = firebase.auth().currentUser;
            if(!name || !user) return;
            db.ref('users/'+user.uid+'/docs').push({ 
                name: name, 
                date: new Date().toLocaleString() 
            });
            document.getElementById('docName').value = "";
        }

        function load(uid) {
            db.ref('users/'+uid+'/docs').on('value', snap => {
                const data = snap.val();
                const list = document.getElementById('records');
                list.innerHTML = "";
                for(let id in data) {
                    list.innerHTML += `
                        <div class="item">
                            <div>
                                <span style="display:block; font-weight:bold">📄 ${data[id].name}</span>
                                <small style="color:#666; font-size:10px">${data[id].date}</small>
                            </div>
                            <i class="fa-solid fa-trash" onclick="del('${id}')"></i>
                        </div>`;
                }
            });
        }

        function del(id) {
            if(confirm("Permanently delete this record?")) {
                const uid = firebase.auth().currentUser.uid;
                db.ref('users/'+uid+'/docs/'+id).remove();
            }
        }

        function logout() {
            firebase.auth().signOut().then(() => window.location.replace("index.html"));
        }
    </script>
</body>
</html>
