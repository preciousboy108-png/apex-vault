<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Vault</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #00d4ff; margin-top: 0; text-align: center; }
        input, button { display: block; width: 100%; margin: 12px 0; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: #00d4ff; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0099cc; }
        #status { font-size: 0.9em; color: #0099cc; text-align: center; display: none; font-weight: bold; }
        .file-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .file-info b { font-size: 1.1em; color: #222; }
        .file-info small { color: #888; }
        .view-btn { width: auto; padding: 6px 15px; margin: 0; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>APEX VAULT</h2>
        <input type="text" id="docName" placeholder="Document Name (e.g. FUTA EWM 201 Notes)">
        <input type="file" id="filePicker" accept=".pdf,image/*">
        <button id="uploadBtn" onclick="uploadToDatabase()">Secure to Cloud</button>
        <div id="status">Uploading to Vault...</div>
    </div>

    <h3>Your Stored Files</h3>
    <div id="records"></div>

    <!-- Firebase SDKs (Using Version 8 for easier mobile compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB-AsF-EtsHFRWnMjc3LQSD2UqaNxM2vXc",
            authDomain: "apex-vault-3f235.firebaseapp.com",
            databaseURL: "https://apex-vault-3f235-default-rtdb.firebaseio.com",
            projectId: "apex-vault-3f235",
            storageBucket: "apex-vault-3f235.firebasestorage.app",
            messagingSenderId: "526402607684",
            appId: "1:526402607684:web:6b32fea6ee28a7df0d3a11",
            measurementId: "G-RKGYV47YFK"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // This is your unique folder name in the database
        const userId = "Precious_Vault_User"; 

        // Function: Upload File as Base64 Text
        function uploadToDatabase() {
            const fileInput = document.getElementById('filePicker');
            const docName = document.getElementById('docName').value;
            const status = document.getElementById('status');

            if (!fileInput.files[0] || !docName) {
                alert("Please give the file a name and select a file!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            status.style.display = "block";
            status.innerText = "Processing file...";

            reader.onload = function(e) {
                const base64String = e.target.result;
                
                db.ref("uploads/" + userId).push({
                    name: docName,
                    fileData: base64String,
                    timestamp: Date.now()
                }).then(() => {
                    status.innerText = "Success! Saved to Apex Vault.";
                    document.getElementById('docName').value = "";
                    fileInput.value = "";
                    setTimeout(() => { status.style.display = "none"; }, 3000);
                }).catch((error) => {
                    alert("Error: " + error.message);
                    status.style.display = "none";
                });
            };

            reader.readAsDataURL(file);
        }

        // Function: Fetch and Display Files
        function fetchRecords() {
            db.ref("uploads/" + userId).on("value", (snapshot) => {
                const recordsDiv = document.getElementById("records");
                recordsDiv.innerHTML = ""; 
                
                if (!snapshot.exists()) {
                    recordsDiv.innerHTML = "<p style='text-align:center; color:#999;'>No files stored yet.</p>";
                    return;
                }

                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    recordsDiv.innerHTML += `
                        <div class="card">
                            <div class="file-list-item">
                                <div class="file-info">
                                    <b>${data.name}</b><br>
                                    <small>Stored in Cloud</small>
                                </div>
                                <button class="view-btn" onclick="downloadFile('${data.fileData}', '${data.name}')">
                                    View
                                </button>
                            </div>
                        </div>`;
                });
            });
        }

        // Function: Convert text back to a downloadable file
        function downloadFile(base64, fileName) {
            try {
                const link = document.createElement("a");
                link.href = base64; 
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                alert("Access Error: " + error.message);
            }
        }

        // Start fetching data when the page loads
        fetchRecords();
    </script>
</body>
</html>
